name: release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    name: build (${{ matrix.target }})
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            archive: tar.xz
            binary: glia
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
            archive: tar.xz
            binary: glia
          - target: x86_64-apple-darwin
            os: macos-latest
            archive: tar.xz
            binary: glia
          - target: aarch64-apple-darwin
            os: macos-latest
            archive: tar.xz
            binary: glia
          - target: x86_64-pc-windows-msvc
            os: windows-latest
            archive: zip
            binary: glia.exe
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: 1.85
          components: rustfmt
          targets: ${{ matrix.target }}
      - name: Cache cargo registry & build
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: "."
      - name: Build release binary
        run: cargo build --release --target ${{ matrix.target }} -p glia-cli
      - name: Package artifact
        shell: bash
        run: |
          set -euo pipefail
          BIN="target/${{ matrix.target }}/release/${{ matrix.binary }}"
          OUT="glia-${{ github.ref_name }}-${{ matrix.target }}"
          mkdir -p "$OUT"
          cp "$BIN" "$OUT/"
          if [ -f README.md ]; then cp README.md "$OUT/"; fi
          if [ -f LICENSE ]; then cp LICENSE "$OUT/"; fi
          case "${{ matrix.archive }}" in
            tar.xz) tar -C "$OUT/.." -cJf "$OUT.tar.xz" "$(basename "$OUT")" ;;
            zip) (cd "$OUT/.." && zip -r "$OUT.zip" "$(basename "$OUT")") ;;
          esac
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: glia-${{ matrix.target }}
          path: glia-${{ github.ref_name }}-${{ matrix.target }}.${{ matrix.archive }}
          if-no-files-found: error

  release:
    name: github-release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          name: ${{ github.ref_name }}
          generate_release_notes: true
          files: |
            artifacts/**/glia-*-${{ github.ref_name }}-*.tar.xz
            artifacts/**/glia-*-${{ github.ref_name }}-*.zip
