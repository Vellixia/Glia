name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: "-D warnings"

jobs:
  # Fast gate: fmt + clippy on ubuntu only.
  # Format and lint rules are platform-independent — no need to repeat on macOS/Windows.
  lint:
    name: lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@1.89
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: "."
      - name: cargo fmt --check
        run: cargo fmt --all -- --check
      - name: cargo clippy
        run: cargo clippy --workspace --all-targets -- -D warnings

  # Cross-platform unit + integration tests.
  # glia-e2e is excluded — it needs live Docker services and runs locally only.
  # --test-threads=1 only on Windows (tmp-dir race in glia-init); unix runs parallel.
  test:
    name: test (${{ matrix.os }})
    needs: lint
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
          - os: macos-latest
          - os: windows-latest
            test_args: "-- --test-threads=1"
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@1.89
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: "."
      - name: cargo test
        run: cargo test --workspace --exclude glia-e2e --no-fail-fast ${{ matrix.test_args }}

  # Verify the release binary compiles. Runs on ubuntu only — the release
  # workflow handles cross-compilation for all targets on tag push.
  build:
    name: build (release)
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@1.89
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: "."
      - name: cargo build --release
        run: cargo build --release -p glia-cli
