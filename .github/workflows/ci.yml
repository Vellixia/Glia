name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: "-D warnings"

jobs:
  test:
    name: test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    steps:
      - uses: actions/checkout@v4
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@1.89
        with:
          components: rustfmt, clippy
      - name: Cache cargo registry & build
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: "."
      - name: cargo fmt --check
        run: cargo fmt --all -- --check
      - name: cargo clippy (workspace)
        run: cargo clippy --workspace --all-targets -- -D warnings
      - name: cargo test (workspace)
        # --test-threads=1 avoids a Windows-only race in
        # glia-init::tests::count_files_skips_node_modules where parallel
        # tests can briefly see a sibling test's tmp dir contents.
        # Exclude glia-e2e here; it runs in the dedicated docker-e2e job.
        run: cargo test --workspace --all-targets --no-fail-fast --exclude glia-e2e -- --test-threads=1
      - name: cargo build (release glia-cli)
        run: cargo build --release -p glia-cli

  docker-e2e:
    name: e2e (docker services)
    runs-on: ubuntu-latest
    needs: test
    services:
      openbao:
        image: openbao/openbao:2.2
        ports:
          - 8201:8200
        options: >-
          --cap-add IPC_LOCK
          -e BAO_API_ADDR=http://0.0.0.0:8200
        env:
          BAO_DEV_ROOT_TOKEN_ID: glia-root
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@1.89
      - name: Cache cargo registry & build
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: "."
      - name: Start HelixDB (dev instance via docker)
        run: |
          docker run -d --name helixdb \
            -p 6969:6969 \
            ghcr.io/helixdb/enterprise-dev:latest \
            helix start dev --port 6969 --bind 0.0.0.0:6969 || true
          # HelixDB may not be available on CI — e2e tests soft-skip if unreachable
          sleep 5
      - name: cargo test (e2e only)
        env:
          GLIA_HELIX_URL: http://127.0.0.1:6969
          GLIA_OPENBAO_URL: http://127.0.0.1:8201
          GLIA_OPENBAO_TOKEN: glia-root
          GLIA_REDIS_URL: redis://127.0.0.1:6379/0
          GLIA_HUB_TOKEN: test-ci-token
        run: cargo test -p glia-e2e --no-fail-fast -- --test-threads=1
