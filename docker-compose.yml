# Glia — docker-compose for Hub + HelixDB + OpenBao + Redis.
# v0.2.0: SurrealDB replaced with HelixDB (graph+vector, Apache-2.0).
# HelixDB instance runs as a separate container; Hub talks to it via
# HTTP on `localhost:6969`.

services:
  helixdb:
    # The HelixDB dev instance is managed by the `helix` CLI (the OSS v2
    # CLI pulls `ghcr.io/helixdb/enterprise-dev:latest` + a MinIO container
    # and wires them together). To start a local dev instance manually:
    #   helix init local         # in a scratch dir (creates .helix/, helix.toml)
    #   helix start --port 6969 --foreground
    #
    # v0.2.0 compose ships the OSS HelixDB gateway via the CLI; the Hub
    # container depends on the dev instance being reachable at
    # `http://helixdb:6969`. Glia schema (HelixQL `#[register]` queries) is
    # loaded by the Hub at startup once T23.1 lands.
    image: ghcr.io/helixdb/enterprise-dev:latest
    command: ["helix", "start", "dev", "--port", "6969", "--bind", "0.0.0.0:6969"]
    ports:
      - "6969:6969"
    restart: unless-stopped

  openbao:
    image: openbao/openbao:2.2
    cap_add:
      - IPC_LOCK
    command: ["server", "-dev", "-dev-listen-address=0.0.0.0:8200", "-dev-root-token-id=glia-root"]
    ports:
      - "8201:8200"
    environment:
      BAO_API_ADDR: "http://0.0.0.0:8200"
    volumes:
      - openbao_data:/openbao/file
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:8200/v1/sys/health"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    command: ["redis-server", "--appendonly", "yes", "--maxmemory", "256mb", "--maxmemory-policy", "allkeys-lru"]
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  glia-hub:
    build:
      context: .
      dockerfile: Dockerfile.hub
    depends_on:
      helixdb:
        condition: service_started
      openbao:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - "3000:3000"
    environment:
      GLIA_HELIX_URL: "http://helixdb:6969"
      GLIA_HELIX_TOKEN: "${HELIXDB_TOKEN:-}"
      GLIA_OPENBAO_URL: "http://openbao:8200"
      GLIA_OPENBAO_TOKEN: "${OPENBAO_ROOT_TOKEN:-glia-root}"
      GLIA_REDIS_URL: "redis://redis:6379/0"
      GLIA_HUB_BIND: "0.0.0.0:3000"
      RUST_LOG: info
    restart: unless-stopped

  web:
    build:
      context: .
      dockerfile: Dockerfile.web
      args:
        # Bake the public-facing Hub URL into the JS bundle.
        # In production, set this to the externally-reachable URL of
        # the glia-hub service (e.g. https://hub.glia.example.com).
        # For local dev via compose, the web server proxies /api/graphql
        # to glia-hub internally, so the public URL is the web dashboard
        # itself. NEXT_PUBLIC_HUB_URL is also used by graphql-client.ts
        # for direct browser→hub calls; see apps/web/src/lib/graphql-client.ts.
        NEXT_PUBLIC_HUB_URL: "${NEXT_PUBLIC_HUB_URL:-http://localhost:3001}"
    depends_on:
      glia-hub:
        condition: service_started
    # Port mapping is set in glia-test/compose.test.yml (overlay). The
    # web service is only exposed to the host for live UI tests; in
    # production it sits behind a reverse proxy. Keeping the base
    # port-less avoids conflicts with other local stacks.
    environment:
      # Server-side env: used by rewrites() to proxy /api/graphql →
      # http://glia-hub:3000/graphql inside the compose network.
      HUB_URL: "http://glia-hub:3000"

      # Public env: passed through for runtime reference (Next.js
      # replaces NEXT_PUBLIC_* at build time, but the build arg above
      # handles that; setting it here makes it available for any
      # process-level reads that happen server-side).
      NEXT_PUBLIC_HUB_URL: "${NEXT_PUBLIC_HUB_URL:-http://localhost:3001}"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3000/"]
      interval: 30s
      timeout: 5s
      start_period: 15s
      retries: 3

volumes:
  openbao_data:
  redis_data: