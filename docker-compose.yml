# Glia — docker-compose for Hub + HelixDB + OpenBao + Redis.
# v0.2.0: SurrealDB replaced with HelixDB (graph+vector, Apache-2.0).
# HelixDB instance runs as a separate container; Hub talks to it via
# HTTP on `localhost:6969`.

services:
  helixdb:
    # The HelixDB dev instance is managed by the `helix` CLI (the OSS v2
    # CLI pulls `ghcr.io/helixdb/enterprise-dev:latest` + a MinIO container
    # and wires them together). To start a local dev instance manually:
    #   helix init local         # in a scratch dir (creates .helix/, helix.toml)
    #   helix start --port 6969 --foreground
    #
    # v0.2.0 compose ships the OSS HelixDB gateway via the CLI; the Hub
    # container depends on the dev instance being reachable at
    # `http://helixdb:6969`. Glia schema (HelixQL `#[register]` queries) is
    # loaded by the Hub at startup once T23.1 lands.
    image: ghcr.io/helixdb/enterprise-dev:latest
    command: ["helix", "start", "dev", "--port", "6969", "--bind", "0.0.0.0:6969"]
    ports:
      - "6969:6969"
    restart: unless-stopped

  openbao:
    image: openbao/openbao:2.2
    cap_add:
      - IPC_LOCK
    command: ["server", "-dev", "-dev-listen-address=0.0.0.0:8200", "-dev-root-token-id=glia-root"]
    ports:
      - "8201:8200"
    environment:
      BAO_API_ADDR: "http://0.0.0.0:8200"
    volumes:
      - openbao_data:/openbao/file
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:8200/v1/sys/health"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    command: ["redis-server", "--appendonly", "yes", "--maxmemory", "256mb", "--maxmemory-policy", "allkeys-lru"]
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  glia-hub:
    build:
      context: .
      dockerfile: Dockerfile.hub
    depends_on:
      helixdb:
        condition: service_started
      openbao:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - "3000:3000"
    environment:
      GLIA_HELIX_URL: "http://helixdb:6969"
      GLIA_HELIX_TOKEN: "${HELIXDB_TOKEN:-}"
      GLIA_OPENBAO_URL: "http://openbao:8200"
      GLIA_OPENBAO_TOKEN: "${OPENBAO_ROOT_TOKEN:-glia-root}"
      GLIA_REDIS_URL: "redis://redis:6379/0"
      GLIA_HUB_BIND: "0.0.0.0:3000"
      RUST_LOG: info
    restart: unless-stopped

volumes:
  openbao_data:
  redis_data: