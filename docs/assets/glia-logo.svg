<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 96" role="img" aria-label="Glia">
  <title>Glia</title>
  <desc>Two interlocking nodes with a graph inside and a G monogram.</desc>

  <defs>
    <linearGradient id="g" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#7c5cff"/>
      <stop offset="100%" stop-color="#22d3ee"/>
    </linearGradient>
    <linearGradient id="g2" x1="0" y1="1" x2="1" y2="0">
      <stop offset="0%" stop-color="#22d3ee"/>
      <stop offset="100%" stop-color="#34d399"/>
    </linearGradient>
    <clipPath id="left">
      <circle cx="34" cy="48" r="28"/>
    </clipPath>
    <clipPath id="right">
      <circle cx="74" cy="48" r="28"/>
    </clipPath>
  </defs>

  <!-- Left node (purple) -->
  <circle cx="34" cy="48" r="28" fill="url(#g)"/>
  <!-- Right node (cyan), overlapping -->
  <circle cx="74" cy="48" r="28" fill="url(#g2)" opacity="0.92"/>
  <!-- Intersection highlight -->
  <path d="M 54 25.5 A 28 28 0 0 1 54 70.5 A 28 28 0 0 1 54 25.5 Z" fill="#0b0f17" opacity="0.18"/>

  <!-- Node graph inside the overlap (clipped) -->
  <g clip-path="url(#left)">
    <g stroke="#0b0f17" stroke-width="1.4" stroke-linecap="round" opacity="0.55" fill="none">
      <line x1="22" y1="34" x2="54" y2="48"/>
      <line x1="22" y1="62" x2="54" y2="48"/>
      <line x1="54" y1="48" x2="86" y2="34"/>
      <line x1="54" y1="48" x2="86" y2="62"/>
    </g>
    <g fill="#0b0f17" opacity="0.7">
      <circle cx="22" cy="34" r="2.2"/>
      <circle cx="22" cy="62" r="2.2"/>
      <circle cx="86" cy="34" r="2.2"/>
      <circle cx="86" cy="62" r="2.2"/>
      <circle cx="54" cy="48" r="2.6"/>
    </g>
  </g>

  <!-- G monogram, white, centered across the overlap -->
  <text x="54" y="58" text-anchor="middle"
        font-family="ui-sans-serif, -apple-system, Segoe UI, Inter, Helvetica, Arial, sans-serif"
        font-weight="800" font-size="30" fill="#ffffff" letter-spacing="-1">G</text>

  <!-- Wordmark -->
  <g font-family="ui-sans-serif, -apple-system, Segoe UI, Inter, Helvetica, Arial, sans-serif"
     font-weight="700" font-size="34" letter-spacing="-1.2" fill="#0b0f17">
    <text x="116" y="62">Glia</text>
  </g>
  <!-- Tagline, monospaced, faint -->
  <g font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace"
     font-size="11" fill="#475569" letter-spacing="0.5">
    <text x="117" y="80">cognitive control plane</text>
  </g>
</svg>
