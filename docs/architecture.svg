<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 520" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif" font-size="13" role="img" aria-label="Glia architecture diagram">
  <title>Glia architecture</title>
  <desc>Three trust tiers: agent (MCP) calls glia CLI which uses an embedded SurrealDB locally or syncs to a glia-hub over WebSocket. The Hub coordinates SurrealDB, OpenBao, Redis, and a sandbox. The community catalog is pulled into the CLI's private sandbox.</desc>

  <defs>
    <linearGradient id="agent" x1="0" x2="0" y1="0" y2="1">
      <stop offset="0%" stop-color="#fde7e9"/>
      <stop offset="100%" stop-color="#fbcad0"/>
    </linearGradient>
    <linearGradient id="cli" x1="0" x2="0" y1="0" y2="1">
      <stop offset="0%" stop-color="#e3f2fd"/>
      <stop offset="100%" stop-color="#bbdefb"/>
    </linearGradient>
    <linearGradient id="hub" x1="0" x2="0" y1="0" y2="1">
      <stop offset="0%" stop-color="#e8f5e9"/>
      <stop offset="100%" stop-color="#c8e6c9"/>
    </linearGradient>
    <linearGradient id="store" x1="0" x2="0" y1="0" y2="1">
      <stop offset="0%" stop-color="#fff3e0"/>
      <stop offset="100%" stop-color="#ffe0b2"/>
    </linearGradient>
    <linearGradient id="catalog" x1="0" x2="0" y1="0" y2="1">
      <stop offset="0%" stop-color="#f3e5f5"/>
      <stop offset="100%" stop-color="#e1bee7"/>
    </linearGradient>
    <marker id="arr" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#37474f"/>
    </marker>
    <marker id="arrRed" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#c62828"/>
    </marker>
  </defs>

  <!-- background -->
  <rect width="880" height="520" fill="#fafafa"/>

  <!-- title -->
  <text x="440" y="28" text-anchor="middle" font-size="18" font-weight="600" fill="#263238">Glia — cognitive control plane</text>
  <text x="440" y="48" text-anchor="middle" fill="#546e7a">Three trust tiers · single tool · zero-trust by default</text>

  <!-- tier labels -->
  <text x="80"  y="76" text-anchor="middle" font-size="11" font-weight="600" fill="#b71c1c" letter-spacing="1">AGENT</text>
  <text x="80"  y="90" text-anchor="middle" font-size="10" fill="#b71c1c">untrusted</text>
  <text x="290" y="76" text-anchor="middle" font-size="11" font-weight="600" fill="#0d47a1" letter-spacing="1">LOCAL</text>
  <text x="290" y="90" text-anchor="middle" font-size="10" fill="#0d47a1">semi-trusted</text>
  <text x="610" y="76" text-anchor="middle" font-size="11" font-weight="600" fill="#1b5e20" letter-spacing="1">HUB</text>
  <text x="610" y="90" text-anchor="middle" font-size="10" fill="#1b5e20">trusted</text>
  <text x="820" y="76" text-anchor="middle" font-size="11" font-weight="600" fill="#4a148c" letter-spacing="1">CATALOG</text>
  <text x="820" y="90" text-anchor="middle" font-size="10" fill="#4a148c">community</text>

  <!-- vertical tier separators -->
  <line x1="160" y1="60" x2="160" y2="500" stroke="#cfd8dc" stroke-dasharray="4 4"/>
  <line x1="420" y1="60" x2="420" y2="500" stroke="#cfd8dc" stroke-dasharray="4 4"/>
  <line x1="800" y1="60" x2="800" y2="500" stroke="#cfd8dc" stroke-dasharray="4 4"/>

  <!-- MCP client -->
  <g>
    <rect x="20" y="160" width="140" height="60" rx="8" fill="url(#agent)" stroke="#b71c1c" stroke-width="1.5"/>
    <text x="90" y="184" text-anchor="middle" font-weight="600" fill="#b71c1c">MCP client</text>
    <text x="90" y="202" text-anchor="middle" font-size="11" fill="#37474f">Cursor · Cline · opencode</text>
  </g>

  <!-- glia action call -->
  <g>
    <rect x="20" y="260" width="140" height="100" rx="8" fill="#ffffff" stroke="#b71c1c" stroke-width="1" stroke-dasharray="3 2"/>
    <text x="90" y="282" text-anchor="middle" font-weight="600" fill="#b71c1c">glia_action(</text>
    <text x="90" y="298" text-anchor="middle" font-size="11" fill="#37474f" font-family="ui-monospace,'SF Mono',monospace">intent,</text>
    <text x="90" y="313" text-anchor="middle" font-size="11" fill="#37474f" font-family="ui-monospace,'SF Mono',monospace">params</text>
    <text x="90" y="332" text-anchor="middle" font-weight="600" fill="#b71c1c">)</text>
    <text x="90" y="349" text-anchor="middle" font-size="10" fill="#546e7a">one tool, ever</text>
  </g>

  <!-- glia CLI box -->
  <g>
    <rect x="200" y="140" width="220" height="320" rx="10" fill="url(#cli)" stroke="#0d47a1" stroke-width="1.5"/>
    <text x="310" y="164" text-anchor="middle" font-weight="600" fill="#0d47a1">glia CLI</text>
    <text x="310" y="180" text-anchor="middle" font-size="10" fill="#0d47a1">(single binary, no JS runtime)</text>

    <rect x="216" y="198" width="188" height="34" rx="6" fill="#ffffff" stroke="#1976d2"/>
    <text x="310" y="220" text-anchor="middle" fill="#263238">bridge (stdio ⇄ WS)</text>

    <rect x="216" y="240" width="188" height="34" rx="6" fill="#ffffff" stroke="#1976d2"/>
    <text x="310" y="262" text-anchor="middle" fill="#263238">glia-action · glia-init · sync</text>

    <rect x="216" y="282" width="188" height="34" rx="6" fill="#ffffff" stroke="#1976d2"/>
    <text x="310" y="304" text-anchor="middle" fill="#263238">glia-bash (allow-list)</text>

    <rect x="216" y="324" width="188" height="34" rx="6" fill="#ffffff" stroke="#1976d2"/>
    <text x="310" y="346" text-anchor="middle" fill="#263238">glia-embed (candle + MiniLM)</text>

    <rect x="216" y="366" width="188" height="34" rx="6" fill="#ffffff" stroke="#1976d2"/>
    <text x="310" y="388" text-anchor="middle" fill="#263238">glia-author (LLM tool-writer)</text>

    <rect x="216" y="408" width="188" height="34" rx="6" fill="#ffffff" stroke="#1976d2"/>
    <text x="310" y="430" text-anchor="middle" fill="#263238">local:: skills</text>
  </g>

  <!-- glia-hub box -->
  <g>
    <rect x="440" y="140" width="360" height="320" rx="10" fill="url(#hub)" stroke="#1b5e20" stroke-width="1.5"/>
    <text x="620" y="164" text-anchor="middle" font-weight="600" fill="#1b5e20">glia-hub</text>
    <text x="620" y="180" text-anchor="middle" font-size="10" fill="#1b5e20">(Axum, single ELF, ports 3000)</text>

    <rect x="456" y="198" width="180" height="34" rx="6" fill="#ffffff" stroke="#2e7d32"/>
    <text x="546" y="220" text-anchor="middle" fill="#263238">glia-sandbox (UVX/Sandbox)</text>

    <rect x="644" y="198" width="140" height="34" rx="6" fill="#ffffff" stroke="#2e7d32"/>
    <text x="714" y="220" text-anchor="middle" fill="#263238">glia-hooks</text>

    <rect x="456" y="240" width="180" height="34" rx="6" fill="#ffffff" stroke="#2e7d32"/>
    <text x="546" y="262" text-anchor="middle" fill="#263238">glia-synth (≤150 tok)</text>

    <rect x="644" y="240" width="140" height="34" rx="6" fill="#ffffff" stroke="#2e7d32"/>
    <text x="714" y="262" text-anchor="middle" fill="#263238">glia-cache</text>

    <rect x="456" y="282" width="328" height="34" rx="6" fill="#ffffff" stroke="#2e7d32"/>
    <text x="620" y="304" text-anchor="middle" fill="#263238">glia-action / gateway (WS)</text>

    <rect x="456" y="324" width="328" height="34" rx="6" fill="#ffffff" stroke="#2e7d32"/>
    <text x="620" y="346" text-anchor="middle" fill="#263238">glia-bao (Transit, KV, response-wrap)</text>

    <rect x="456" y="366" width="328" height="34" rx="6" fill="#ffffff" stroke="#2e7d32"/>
    <text x="620" y="388" text-anchor="middle" fill="#263238">MCP surface: glia_action only</text>

    <rect x="456" y="408" width="328" height="34" rx="6" fill="#ffffff" stroke="#2e7d32"/>
    <text x="620" y="430" text-anchor="middle" fill="#263238">community:: sandbox (UVX)</text>
  </g>

  <!-- storage tier -->
  <g>
    <rect x="440" y="476" width="360" height="32" rx="6" fill="url(#store)" stroke="#e65100"/>
    <text x="620" y="497" text-anchor="middle" fill="#263238">SurrealDB · OpenBao · Redis (sidecar compose stack)</text>
  </g>

  <!-- catalog -->
  <g>
    <rect x="820" y="160" width="44" height="280" rx="8" fill="url(#catalog)" stroke="#4a148c" stroke-width="1.5"/>
    <text x="842" y="250" text-anchor="middle" font-size="11" font-weight="600" fill="#4a148c" transform="rotate(90 842 250)">community-catalog</text>
  </g>

  <!-- arrows: agent -> glia_action -->
  <line x1="160" y1="190" x2="200" y2="190" stroke="#37474f" stroke-width="1.5" marker-end="url(#arr)"/>
  <line x1="160" y1="310" x2="200" y2="310" stroke="#37474f" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- CLI -> Hub (WS gateway) -->
  <path d="M 420 280 C 432 280, 444 290, 456 290" fill="none" stroke="#37474f" stroke-width="1.5" marker-end="url(#arr)"/>
  <text x="438" y="275" text-anchor="middle" font-size="10" fill="#37474f">WS</text>

  <!-- Hub -> CLI (response / auth) -->
  <path d="M 456 304 C 444 304, 432 320, 420 320" fill="none" stroke="#37474f" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- CLI pulls catalog (dashed, "private sandbox") -->
  <path d="M 420 410 C 620 410, 720 410, 820 410" fill="none" stroke="#4a148c" stroke-width="1.2" stroke-dasharray="5 3" marker-end="url(#arr)"/>
  <text x="620" y="402" text-anchor="middle" font-size="10" fill="#4a148c">git pull → private sandbox (never on Hub)</text>

  <!-- Hub -> storage -->
  <line x1="620" y1="460" x2="620" y2="476" stroke="#37474f" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- credential flow (red dashed) - secret into sandbox only -->
  <path d="M 460 348 C 380 348, 320 348, 260 240" fill="none" stroke="#c62828" stroke-width="1.2" stroke-dasharray="4 3" marker-end="url(#arrRed)"/>
  <text x="320" y="338" text-anchor="middle" font-size="10" fill="#c62828">response-wrapping token</text>
  <text x="320" y="352" text-anchor="middle" font-size="10" fill="#c62828">(Hub ⊥ plaintext)</text>

  <!-- legend -->
  <g font-size="11" fill="#37474f">
    <rect x="20" y="476" width="140" height="32" rx="6" fill="#ffffff" stroke="#b71c1c"/>
    <text x="90" y="497" text-anchor="middle">MCP</text>

    <line x1="170" y1="492" x2="186" y2="492" stroke="#37474f" stroke-width="1.5" marker-end="url(#arr)"/>
    <text x="190" y="496">control</text>

    <line x1="240" y1="492" x2="256" y2="492" stroke="#c62828" stroke-width="1.5" stroke-dasharray="3 2" marker-end="url(#arrRed)"/>
    <text x="260" y="496">secrets</text>

    <line x1="306" y1="492" x2="322" y2="492" stroke="#4a148c" stroke-width="1.5" stroke-dasharray="3 2" marker-end="url(#arr)"/>
    <text x="326" y="496">catalog pull</text>
  </g>
</svg>
