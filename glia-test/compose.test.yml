# compose.test.yml — overlay for glia-test/.
# Use as: docker compose -f docker-compose.yml -f compose.test.yml up -d
#
# Adds the auth env vars that glia-hub requires (crate config.rs reads
# GLIA_JWT_SECRET + GLIA_ADMIN_HASH at boot). Without these, login fails.
#
# Reads from `.env` so each developer can pick their own test password
# (no defaults — `.env.example` ships an argon2 hash for password `glia`).

services:
  glia-hub:
    environment:
      GLIA_JWT_SECRET: "${GLIA_JWT_SECRET:?required for tests}"
      GLIA_ADMIN_HASH: "${GLIA_ADMIN_HASH:?required for tests}"
      RUST_LOG: "glia_hub=info,glia_sandbox=info,info"
    # Bind only on loopback — tests never target a remote host.
    ports:
      - "127.0.0.1:3000:3000"

  web:
    environment:
      HUB_URL: "http://glia-hub:3000"
      NEXT_PUBLIC_HUB_URL: "http://localhost:3000"
    ports:
      # Web dashboard on host port 3001 (Hub is on 3000).
      - "127.0.0.1:3001:3000"
